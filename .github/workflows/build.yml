name: Build

on:
  push:
    branches: [master]      # validation — runs the build jobs but NOT release
  schedule:
    - cron: '0 6 * * *'     # daily at 06:00 UTC: build + publish release
  workflow_dispatch:        # manual trigger: build + publish release

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: python build.py

      - name: Get version
        id: version
        run: |
          $version = python -c "from version import APP_VERSION; print(APP_VERSION)"
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
        shell: pwsh

      - name: Build installer
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          $distPath = "$env:USERPROFILE\app_dist\FastSM\dist\FastSM"
          $outputPath = "$env:USERPROFILE\app_dist\FastSM"
          iscc /DMyAppVersion=${{ steps.version.outputs.version }} /DSourceDir="$distPath" /DOutputDir="$outputPath" installer.iss
        shell: pwsh

      - name: Find build artifacts
        id: artifact
        run: |
          $zip = Get-ChildItem -Path . -Filter "FastSM-Windows-Portable.zip" | Select-Object -First 1
          $installer = Get-ChildItem -Path "$env:USERPROFILE\app_dist\FastSM" -Filter "FastSMInstaller.exe" | Select-Object -First 1
          echo "zip_path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
          echo "zip_name=$($zip.Name)" >> $env:GITHUB_OUTPUT
          echo "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ steps.artifact.outputs.zip_path }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.artifact.outputs.installer_path }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: python build.py

      - name: Find build artifact
        id: artifact
        run: |
          DMG=$(ls FastSM-*.dmg 2>/dev/null | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "name=$DMG" >> $GITHUB_OUTPUT

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ steps.artifact.outputs.path }}

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libsdl2-2.0-0 \
            libasound2 \
            libpulse0 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # wxPython's extras page is a plain directory listing, not a PEP 503
          # simple index — so it must be passed via --find-links, not
          # --extra-index-url. Pin 4.2.2 since that's the newest wheel there.
          pip install -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04 wxpython==4.2.2
          pip install -r requirements.txt
          # Needed by build.py's post-build libprism rewrite.
          pip install patchelf

      - name: Stage libssl 1.1 for bundling
        # BASS does dlopen("libssl.so.1.1") for HTTPS streaming; Ubuntu 22.04+
        # ships only libssl.so.3, so without bundling 1.1 every HTTPS audio
        # attachment fails with BASS_ERROR_SSL. Pull the .so files from
        # Ubuntu 20.04's openssl deb so we always have a 1.1 to ship next
        # to BASS regardless of the host distro.
        run: |
          mkdir -p libssl11
          cd libssl11
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          dpkg-deb -x libssl1.1_*.deb extracted
          cp extracted/usr/lib/x86_64-linux-gnu/libssl.so.1.1 ../libssl.so.1.1
          cp extracted/usr/lib/x86_64-linux-gnu/libcrypto.so.1.1 ../libcrypto.so.1.1
          ls -la ../libssl.so.1.1 ../libcrypto.so.1.1

      - name: Build executable
        env:
          FASTSM_BUNDLE_LIBSSL_DIR: ${{ github.workspace }}
        run: python build.py

      - name: Find build artifact
        id: artifact
        run: |
          TAR=$(ls FastSM-Linux-Portable.tar.gz 2>/dev/null | head -1)
          echo "path=$TAR" >> $GITHUB_OUTPUT
          echo "name=$TAR" >> $GITHUB_OUTPUT

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ steps.artifact.outputs.path }}

  release:
    # Skip on push so we don't churn the latest release on every commit;
    # the daily schedule and manual workflow_dispatch are what publish.
    if: github.event_name != 'push'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          version=$(python -c "from version import APP_VERSION; print(APP_VERSION)")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Download Windows zip artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from commit ${{ github.sha }}

            **Version:** ${{ steps.version.outputs.version }}
            **Built:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.event.head_commit.message }}

            This release is automatically updated on every commit to master.

            ## Downloads
            - **Windows Installer:** FastSMInstaller.exe (Recommended)
            - **Windows Portable:** FastSM-Windows-Portable.zip
            - **macOS:** FastSM-${{ steps.version.outputs.version }}.dmg
            - **Linux Portable:** FastSM-Linux-Portable.tar.gz
          files: artifacts/*
          prerelease: true
          make_latest: false
          # Keep the release published — drafts make releases/download/<tag>/<file>
          # URLs return 404 for unauthenticated users.
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
